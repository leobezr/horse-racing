name: Storybook Snapshots Verification

on:
  workflow_run:
    workflows: ["App Pages"]
    types: ["completed"]

permissions:
  contents: read
  pages: read

jobs:
  snapshots-verify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify deployed Storybook against local snapshots
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/storybook/
        run: yarn test:storybook:snapshots:deployed-vs-local

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-storybook-report
          path: playwright-report
          if-no-files-found: ignore
